<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delivered by Drones - Controles</title>
  <link rel="stylesheet" href="menu.css" />
</head>
<body>
  <div class="city-static" aria-hidden="true">
    <div class="sun"></div>
    <div class="haze"></div>
    <div class="skyline skyline-back"></div>
    <div class="skyline skyline-mid"></div>
    <div class="road"></div>
  </div>

  <main class="subpage-shell">
    <section class="subpage-card" aria-label="Controles do jogo">
      <h1 class="subpage-title">Controles</h1>
      <ul class="subpage-list">
        <li>W / S: frente e tras</li>
        <li>A / D: esquerda e direita</li>
        <li>Space / Shift: subir e descer</li>
        <li>Mouse: girar camera</li>
        <li>P: pausar e retomar</li>
        <li>M: ativa modo debug de missao</li>
        <li>N / B: missao anterior e proxima (debug)</li>
      </ul>

      <nav class="subpage-actions" aria-label="Navegacao">
        <a class="menu-btn" href="index.html">Voltar ao menu</a>
        <a class="menu-btn play" href="jogo.html">Jogar</a>
      </nav>
    </section>
  </main>
  <script src="js/menu-entry.js"></script>
</body>
</html>
